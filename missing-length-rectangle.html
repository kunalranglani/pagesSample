<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayaan's Missing Length Practice (Rectangles)</title>
  <style>
    body { font-family: Arial; background:#f5f7ff; margin:0; padding:12px; }
    .container { max-width:920px; margin:auto; background:white; padding:14px; border-radius:16px; }
    h1 { margin:0 0 8px; font-size:1.7rem; }
    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .q { border:1px solid #ddd; padding:8px; border-radius:10px; }
    .shape { text-align:center; margin:4px 0; }
    svg { max-width:240px; width:100%; height:auto; }
    .answer { margin-top:4px; font-size:0.95rem; }
    button { margin-bottom:10px; padding:7px 10px; border-radius:8px; border:none; background:#4f46e5; color:white; cursor:pointer; }

    @page { margin: 0.35in; }

    @media print {
      body { background:white; padding:0; }
      .container { max-width:none; padding:0; border-radius:0; box-shadow:none; }
      h1 { margin:0 0 6px; font-size:18px; }
      button { display:none; }
      .grid { gap:6px; }
      .q { padding:6px; border-radius:6px; break-inside:avoid; }
      .shape { margin:2px 0; }
      svg { max-width:185px; }
      .answer { margin-top:2px; font-size:12px; }
      b { font-size:13px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ayaan's Missing Length Practice (Rectangles Only)</h1>
    <button onclick="generate()">New Questions</button>
    <div class="grid" id="grid"></div>
  </div>

<script>
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function rectangleQuestion(i) {
  let total = rand(8, 15);
  let part = rand(2, total - 2);
  let missing = total - part;

  return `
  <div class="q">
    <b>${i}. Find the missing length</b>
    <div class="shape">
      <svg viewBox="0 0 300 120">
        <rect x="20" y="40" width="220" height="40" fill="#dff3ff" stroke="#2b6cb0" stroke-width="2"/>
        <line x1="${20 + (part / total) * 220}" y1="40" x2="${20 + (part / total) * 220}" y2="80" stroke="#555" stroke-width="2"/>
        <text x="${20 + (part / total) * 110}" y="30" text-anchor="middle">${part}</text>
        <text x="${20 + (part / total) * 220 + (missing / total) * 110}" y="30" text-anchor="middle" fill="red">?</text>
        <text x="130" y="105" text-anchor="middle">${total}</text>
      </svg>
    </div>
    <div class="answer">Answer: ______</div>
  </div>`;
}

function generate() {
  let grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let i = 1; i <= 10; i++) {
    grid.innerHTML += rectangleQuestion(i);
  }
}

generate();
</script>
</body>
</html>
