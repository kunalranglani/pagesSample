<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayaan's Missing Length Practice</title>
  <style>
    body { font-family: Arial; background:#f5f7ff; margin:0; padding:20px; }
    .container { max-width:1000px; margin:auto; background:white; padding:20px; border-radius:20px; }
    h1 { margin:0 0 10px; }
    .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    .q { border:1px solid #ddd; padding:12px; border-radius:12px; }
    .shape { text-align:center; margin:10px 0; }
    svg { max-width:300px; }
    .answer { margin-top:8px; }
    button { margin-bottom:15px; padding:8px 12px; border-radius:8px; border:none; background:#4f46e5; color:white; cursor:pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ayaan's Missing Length Practice</h1>
    <button onclick="generate()">🔄 New Questions</button>
    <div class="grid" id="grid"></div>
  </div>

<script>
function rand(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }

function splitRectQuestion(i){
  let total = rand(8,15);
  let part = rand(2,total-2);
  let missing = total - part;

  return `
  <div class="q">
    <b>${i}. Find the missing length</b>
    <div class="shape">
      <svg viewBox="0 0 300 120">
        <rect x="20" y="40" width="200" height="40" fill="#dff3ff" stroke="#2b6cb0" stroke-width="2"/>
        <line x1="${20+ (part/total)*200}" y1="40" x2="${20+ (part/total)*200}" y2="80" stroke="#555" stroke-width="2"/>
        <text x="${20 + (part/total)*100}" y="30" text-anchor="middle">${part}</text>
        <text x="${20 + (part/total)*200 + (missing/total)*100}" y="30" text-anchor="middle" fill="red">?</text>
        <text x="120" y="105" text-anchor="middle">${total}</text>
      </svg>
    </div>
    <div class="answer">Answer: ______</div>
  </div>`;
}

function lShapeQuestion(i){
  let top = rand(6,12);
  let right = rand(2,6);
  let bottom = rand(3,8);
  let missing = top - bottom;

  return `
  <div class="q">
    <b>${i}. Find the missing length</b>
    <div class="shape">
      <svg viewBox="0 0 300 180">
        <path d="M40 40 H240 V80 H180 V140 H40 Z" fill="#dff3ff" stroke="#2b6cb0" stroke-width="2"/>
        <text x="140" y="30" text-anchor="middle">${top}</text>
        <text x="260" y="65">${right}</text>
        <text x="110" y="155">${bottom}</text>
        <text x="190" y="95" fill="red">?</text>
      </svg>
    </div>
    <div class="answer">Answer: ______</div>
  </div>`;
}

function generate(){
  let grid = document.getElementById('grid');
  grid.innerHTML = '';

  for(let i=1;i<=10;i++){
    if(Math.random() < 0.5){
      grid.innerHTML += splitRectQuestion(i);
    } else {
      grid.innerHTML += lShapeQuestion(i);
    }
  }
}

generate();
</script>
</body>
</html>
