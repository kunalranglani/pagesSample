<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Long Division</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f7ff; margin:0; padding:12px; }
    .container { max-width:980px; margin:auto; background:white; padding:14px; border-radius:16px; }
    h1 { margin:0 0 6px; font-size:1.7rem; }
    .subtitle { margin:0 0 10px; color:#475569; font-size:0.95rem; }
    button { margin-bottom:10px; padding:7px 10px; border-radius:8px; border:none; background:#4f46e5; color:white; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; }
    .q { border:1px solid #ddd; padding:8px; border-radius:10px; break-inside:avoid; }
    .q-title { margin-bottom:8px; font-weight:700; }
    .long-division { width:110px; margin:0 auto; }
    .quotient-line { width:54px; height:18px; margin:0 0 2px 44px; border-bottom:2px solid #111; }
    .division-row { display:flex; align-items:flex-start; justify-content:center; font-size:26px; line-height:1; }
    .divisor { width:24px; text-align:right; padding-right:6px; }
    .dividend { min-width:56px; padding:2px 0 0 8px; border-top:2px solid #111; border-left:2px solid #111; text-align:right; }
    .work-area {
      height:54px;
      margin-top:8px;
      border-radius:6px;
      background-image: linear-gradient(to bottom, transparent 17px, rgba(99, 102, 241, 0.16) 17px, rgba(99, 102, 241, 0.16) 18px, transparent 18px, transparent 35px, rgba(99, 102, 241, 0.16) 35px, rgba(99, 102, 241, 0.16) 36px, transparent 36px);
    }

    @page { margin: 0.5in 0.5in 0.35in; }

    @media print {
      body { background:white; padding:0; margin:0; }
      .container { max-width:none; padding:0.12in 0.2in 0; border-radius:0; box-shadow:none; }
      h1 { margin:0 0 2px; font-size:16pt; }
      .subtitle { margin:0 0 6px; font-size:9pt; }
      button { display:none; }
      .grid { gap:6px; }
      .q { padding:6px; border-radius:6px; border-color:#bbb; }
      .q-title { margin-bottom:5px; font-size:10pt; }
      .long-division { width:90px; }
      .quotient-line { width:44px; height:15px; margin-left:36px; }
      .division-row { font-size:21px; }
      .divisor { width:20px; padding-right:5px; }
      .dividend { min-width:46px; padding-left:6px; }
      .work-area { height:42px; margin-top:6px; }
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Easy Long Division</h1>
    <p class="subtitle">16 exact-division questions using 2, 3, 4, and 5. Each one divides cleanly with no remainders.</p>
    <button onclick="generate()">New Questions</button>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = rand(0, i);
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function buildProblemBank() {
      const divisors = [2, 3, 4, 5];
      const bank = [];

      divisors.forEach(function (divisor) {
        const firstDigits = [];
        const secondDigits = [0];

        for (let digit = divisor; digit <= 9; digit += divisor) {
          firstDigits.push(digit);
          secondDigits.push(digit);
        }

        firstDigits.forEach(function (firstDigit) {
          secondDigits.forEach(function (secondDigit) {
            bank.push({
              divisor: divisor,
              dividend: firstDigit * 10 + secondDigit
            });
          });
        });
      });

      return bank;
    }

    function questionMarkup(index, problem) {
      return `
      <div class="q">
        <div class="q-title">${index}. Divide</div>
        <div class="long-division">
          <div class="quotient-line"></div>
          <div class="division-row">
            <div class="divisor">${problem.divisor}</div>
            <div class="dividend">${problem.dividend}</div>
          </div>
          <div class="work-area"></div>
        </div>
      </div>`;
    }

    function generate() {
      const grid = document.getElementById('grid');
      const problems = shuffle(buildProblemBank()).slice(0, 24);

      grid.innerHTML = problems.map(function (problem, index) {
        return questionMarkup(index + 1, problem);
      }).join('');
    }

    generate();
  </script>
</body>
</html>
